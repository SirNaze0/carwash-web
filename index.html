<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Carwash Sender</title>
  <style>
    body{font-family:system-ui;margin:20px;max-width:520px}
    input,button{width:100%;padding:12px;margin:8px 0;font-size:16px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    code{display:block;background:#f5f5f5;padding:10px;white-space:pre-wrap}
  </style>
</head>
<body>
  <h2>Enviar sesión Carwash</h2>

  <label>deviceId</label>
  <input id="deviceId" value="carwash-01" />

  <label>sessionId</label>
  <input id="sessionId" type="number" value="9999" />

  <div class="row">
    <div>
      <label>startAt (ISO)</label>
      <input id="startAt" />
    </div>
    <div>
      <label>endAt (ISO)</label>
      <input id="endAt" />
    </div>
  </div>

  <div class="row">
    <div>
      <label>durationSec</label>
      <input id="durationSec" type="number" value="240" />
    </div>
    <div>
      <label>price</label>
      <input id="price" type="number" step="0.01" value="10.00" />
    </div>
  </div>

  <button id="sendBtn">POST</button>

  <h3>Respuesta</h3>
  <code id="out">-</code>

<script>
  function isoNowPlus(seconds=0){
    const d = new Date(Date.now() + seconds*1000);
    return d.toISOString();
  }
  document.getElementById("startAt").value = isoNowPlus(0);
  document.getElementById("endAt").value = isoNowPlus(240);

  document.getElementById("sendBtn").onclick = async () => {
    const payload = {
      deviceId: document.getElementById("deviceId").value.trim(),
      sessionId: Number(document.getElementById("sessionId").value),
      startAt: document.getElementById("startAt").value.trim(),
      endAt: document.getElementById("endAt").value.trim(),
      durationSec: Number(document.getElementById("durationSec").value),
      price: Number(document.getElementById("price").value),
    };

    const out = document.getElementById("out");
    out.textContent = "Enviando...";

    try {
      const r = await fetch("/.netlify/functions/postSession", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(payload),
      });
      const text = await r.text();
      out.textContent = `HTTP ${r.status}\n${text}`;
    } catch(e) {
      out.textContent = "Error: " + e.message;
    }
  };
</script>
</body>
</html>
