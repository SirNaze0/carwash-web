<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Carwash</title>

<style>
body{
  font-family:system-ui;
  text-align:center;
  margin-top:60px;
}

button{
  width:220px;
  height:220px;
  font-size:28px;
  border-radius:50%;
  border:none;
  background:#2ecc71;
  color:white;
}

button.stop{
  background:#e74c3c;
}

.timer{
  font-size:40px;
  margin-top:40px;
}

.status{
  margin-top:20px;
  font-size:16px;
  opacity:0.7;
}

code{
  display:block;
  margin-top:20px;
  background:#f4f4f4;
  padding:10px;
}
</style>
</head>

<body>

<h2>Carwash</h2>

<button id="btn">START</button>

<div class="timer" id="timer">0 s</div>

<div class="status" id="status">
Esperando inicio
</div>

<code id="result">-</code>

<script>

const DEVICE_ID = "carwash-01";

let running = false;
let startTime = null;
let timerInterval = null;
let sessionId = null;

function secondsBetween(a,b){
  return Math.floor((b-a)/1000);
}

async function getNextSessionId(){
  const r = await fetch(
    `https://carwash-backend-nq39.onrender.com/api/sessions/next-id?deviceId=${DEVICE_ID}`
  );
  const data = await r.json();
  return data.nextSessionId;
}

function updateTimer(){
  const now = new Date();
  const sec = secondsBetween(startTime, now);
  document.getElementById("timer").innerText = sec + " s";
}

async function sendSession(endTime){

  const duration = secondsBetween(startTime,endTime);

  const payload = {
    deviceId: DEVICE_ID,
    sessionId: sessionId,
    startAt: startTime.toISOString(),
    endAt: endTime.toISOString(),
    durationSec: duration,
    price: 10.00
  };

  const r = await fetch("/.netlify/functions/postSession",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  });

  const text = await r.text();

  document.getElementById("result").innerText =
    "HTTP "+r.status+"\n"+text;
}

document.getElementById("btn").onclick = async () => {

  const btn = document.getElementById("btn");

  if(!running){

    document.getElementById("status").innerText="Obteniendo sessionId...";

    sessionId = await getNextSessionId();

    startTime = new Date();

    running = true;

    btn.innerText="STOP";
    btn.classList.add("stop");

    document.getElementById("status").innerText =
      "Lavado en curso (sessionId "+sessionId+")";

    timerInterval = setInterval(updateTimer,1000);

  }
  else{

    const endTime = new Date();

    clearInterval(timerInterval);

    running = false;

    btn.innerText="START";
    btn.classList.remove("stop");

    document.getElementById("status").innerText="Enviando datos...";

    await sendSession(endTime);

    document.getElementById("status").innerText="Lavado registrado";
  }

};

</script>

</body>
</html>
